spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/renthub
    username: postgres
    password: "123456"
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate.format_sql: true
      hibernate.physical_naming_strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  devtools:
    restart:
      enabled: false

  flyway:
    enabled: false

app:
  jwt:
    secret-key: NDM1YTBlYmY2ZjhjZTYwM2M0NmE5Y2Y4YTBlN2M5ZDEyMzQ1Njc4OWFiY2RlZmdoaWprbG1ub3BxcnN0dXZ3eHl6
    expiration: 86400000

  ai:
    enabled: true
    gemini:
      api-key: ${GEMINI_API_KEY}
      model: gemini-2.5-flash
      timeout-ms: 15000